name: Update Superthread Card

on:
  push:
    branches: [main, dev]

jobs:
  update-superthread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Parse and Update Superthread
        env:
          ST_API_KEY: ${{ secrets.SUPERTHREAD_API_KEY }}
          ST_TEAM_ID: "teg6H8Tx"
        run: |
          # 1. 커밋 메시지에서 숫자 추출 (C-65 -> 65)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          CARD_NUM=$(echo "$COMMIT_MSG" | grep -oEi 'C-[0-9]+' | head -1 | grep -oE '[0-9]+')

          if [ -z "$CARD_NUM" ]; then
            echo "❌ 카드 번호를 찾지 못했습니다."
            exit 0
          fi
          echo "✅ 작업 대상 카드 번호: $CARD_NUM"

          # 2. 메시지 가공 (HTML <p> 태그 추가)
          # 줄바꿈을 처리하기 위해 간단한 가공을 거칩니다.
          FORMATTED_MSG="<p><b>🚀 Git Push 알림 (${{ github.ref_name }})</b><br>작업자: $AUTHOR<br>내용: $COMMIT_MSG</p>"

          # 3. 댓글 작성 (알아낸 정답 형식 적용)
          echo "💬 Superthread에 댓글 등록 중..."
          POST_RES=$(curl -s -w "\n%{http_code}" -X POST "https://api.superthread.com/v1/$ST_TEAM_ID/comments" \
               -H "Authorization: Bearer $ST_API_KEY" \
               -H "Content-Type: application/json" \
               --data-raw "{
                 \"card_id\": \"$CARD_NUM\",
                 \"schema\": 1,
                 \"content\": \"$FORMATTED_MSG\"
               }")

          # 결과 확인
          HTTP_STATUS=$(echo "$POST_RES" | tail -n1)
          if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "🎉 성공: Superthread 카드에 기록되었습니다."
          else
            echo "❌ 실패 응답: $POST_RES"
            exit 1
          fi