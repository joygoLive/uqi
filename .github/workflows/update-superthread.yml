name: Update Superthread Card (Always C-65)

on:
  push:
    branches: [main, dev]

jobs:
  update-superthread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Send Commit Log to Superthread
        env:
          ST_API_KEY: ${{ secrets.SUPERTHREAD_API_KEY }}
          ST_TEAM_ID: "teg6H8Tx"
          TARGET_CARD_NUM: "65" # 업데이트할 카드 번호를 65로 고정
        run: |
          # 1. 정보 추출
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          
          echo "=== 커밋 메시지 전송 시작 ==="
          echo "대상 카드: C-$TARGET_CARD_NUM"
          echo "작성자: $AUTHOR"

          # 2. HTML 메시지 가공 (특수문자 및 줄바꿈 처리)
          # 커밋 메시지의 줄바꿈을 <br>로 변환하여 HTML 형식으로 만듭니다.
          COMMIT_HTML=$(echo "$COMMIT_MSG" | sed 's/$/<br>/' | tr -d '\n' | tr -d '\r')
          FULL_HTML="<p><b>🚀 Git Push 알림 (${{ github.ref_name }})</b><br><b>작업자:</b> $AUTHOR<br><b>내용:</b><br>$COMMIT_HTML</p>"

          # 3. jq를 사용하여 안전하게 JSON 데이터 생성
          JSON_PAYLOAD=$(jq -n \
            --arg cid "$TARGET_CARD_NUM" \
            --arg content "$FULL_HTML" \
            '{card_id: $cid, schema: 1, content: $content}')

          # 4. Superthread API 호출
          echo "💬 Superthread C-$TARGET_CARD_NUM 카드에 댓글 등록 중..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.superthread.com/v1/$ST_TEAM_ID/comments" \
               -H "Authorization: Bearer $ST_API_KEY" \
               -H "Content-Type: application/json" \
               -d "$JSON_PAYLOAD")

          # 5. 결과 분석
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP 응답 코드: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "🎉 성공: 모든 커밋 로그가 C-$TARGET_CARD_NUM 카드에 기록되었습니다."
          else
            echo "❌ 실패 응답 본문: $RESPONSE_BODY"
            exit 1
          fi