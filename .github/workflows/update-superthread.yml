name: Update Superthread Card

on:
  push:
    branches: [main, dev]

jobs:
  update-superthread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Parse and Update Superthread
        env:
          ST_API_KEY: ${{ secrets.SUPERTHREAD_API_KEY }}
          ST_TEAM_ID: "teg6H8Tx"
        run: |
          # 1. 정보 추출 (중요: || true를 붙여서 결과가 없어도 에러 방지)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          
          echo "=== 커밋 메시지 분석 ==="
          echo "$COMMIT_MSG"

          # grep 실패 시 스크립트가 죽지 않도록 || echo "" 추가
          RAW_ID=$(echo "$COMMIT_MSG" | grep -oEi 'C-[0-9]+' | head -1 || echo "")
          CARD_NUM=$(echo "$RAW_ID" | grep -oE '[0-9]+' || echo "")

          if [ -z "$CARD_NUM" ]; then
            echo "⚠️ 카드 번호(C-65 등)를 찾지 못했습니다. 작업을 스킵합니다."
            exit 0
          fi
          echo "✅ 대상 카드 번호: $CARD_NUM"

          # 2. HTML 메시지 가공 (특수문자 및 줄바꿈 처리)
          # jq의 --arg를 활용하여 안전하게 주입합니다.
          COMMIT_HTML=$(echo "$COMMIT_MSG" | sed 's/$/<br>/' | tr -d '\n' | tr -d '\r')
          FULL_HTML="<p><b>🚀 Git Push 알림 (${{ github.ref_name }})</b><br><b>작업자:</b> $AUTHOR<br><b>내용:</b><br>$COMMIT_HTML</p>"

          # 3. JSON 생성 (jq 사용)
          JSON_PAYLOAD=$(jq -n \
            --arg cid "$CARD_NUM" \
            --arg content "$FULL_HTML" \
            '{card_id: $cid, schema: 1, content: $content}')

          # 4. API 호출
          echo "💬 Superthread에 댓글 등록 시도 중..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.superthread.com/v1/$ST_TEAM_ID/comments" \
               -H "Authorization: Bearer $ST_API_KEY" \
               -H "Content-Type: application/json" \
               -d "$JSON_PAYLOAD")

          # 5. 결과 확인
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP 응답 코드: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "🎉 성공: Superthread 카드에 기록되었습니다."
          else
            echo "❌ 실패 응답 본문: $RESPONSE_BODY"
            exit 1
          fi