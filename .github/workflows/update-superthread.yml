name: Update Superthread Card

on:
  push:
    branches:
      - main
      - dev

jobs:
  update-superthread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Parse and Update Superthread
        env:
          ST_API_KEY: ${{ secrets.SUPERTHREAD_API_KEY }}
        run: |
          # 1. 커밋 메시지 전체 가져오기
          COMMIT_MSG=$(git log -1 --pretty=%B)
          AUTHOR=$(git log -1 --pretty=%an)
          BRANCH_NAME=${{ github.ref_name }}
          
          echo "=== 분석 시작 ==="

          # 2. 카드 ID 추출 (C-65 전체 유지)
          # 대소문자 무시하고 추출 후 대문자로 통일 (c-65 -> C-65)
          CARD_ID=$(echo "$COMMIT_MSG" | grep -oEi 'C-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')

          if [ -z "$CARD_ID" ]; then
            echo "❌ 메시지에서 C-65와 같은 카드 ID를 찾지 못했습니다."
            exit 0
          fi
          echo "✅ 추출된 카드 ID: $CARD_ID"

          # 3. Superthread API로 카드 검색 (Short ID 사용)
          echo "🔍 카드 정보 조회 중 (ID: $CARD_ID)..."
          # 검색 파라미터에 C-65를 그대로 전달합니다.
          SEARCH_RES=$(curl -s -H "Authorization: Bearer $ST_API_KEY" \
            "https://api.superthread.com/v1/cards?short_id=$CARD_ID")
          
          # 응답 로그 출력 (디버깅용)
          echo "검색 응답: $SEARCH_RES"

          # jq를 사용하여 실제 UUID 추출
          CARD_UUID=$(echo "$SEARCH_RES" | jq -r '.items[0].id // empty')

          if [ -z "$CARD_UUID" ] || [ "$CARD_UUID" == "null" ]; then
            echo "❌ Superthread에서 해당 카드($CARD_ID)를 찾을 수 없습니다."
            echo "응답 메시지를 확인하세요: $SEARCH_RES"
            exit 1
          fi
          echo "✅ 카드 UUID 확인됨: $CARD_UUID"

          # 4. 실제 UUID로 댓글 작성
          echo "💬 댓글 작성 중..."
          POST_RES=$(curl -s -w "\n%{http_code}" -X POST "https://api.superthread.com/v1/cards/$CARD_UUID/comments" \
               -H "Authorization: Bearer $ST_API_KEY" \
               -H "Content-Type: application/json" \
               -d "{
                 \"body\": \"🚀 **Git Push 알림 ($BRANCH_NAME)**\n\n**작업자:** $AUTHOR\n**내용:** $COMMIT_MSG\"
               }")

          HTTP_STATUS=$(echo "$POST_RES" | tail -n1)
          echo "HTTP 상태 코드: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "🎉 성공!"
          else
            echo "❌ 실패 (상태 코드: $HTTP_STATUS)"
            exit 1
          fi