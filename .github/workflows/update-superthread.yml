name: Update Superthread Card

on:
  push:
    branches:
      - dev
      - main

jobs:
  update-superthread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Parse and Debug API
        env:
          ST_API_KEY: ${{ secrets.SUPERTHREAD_API_KEY }}
        run: |
          # 1. 메시지 추출 및 로그 출력
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Full Commit Message: $COMMIT_MSG"

          # 2. ID 추출 (c-65 -> C-65)
          CARD_ID=$(echo "$COMMIT_MSG" | grep -oEi 'C-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')
          
          if [ -z "$CARD_ID" ]; then
            echo "❌ 카드 ID를 찾지 못했습니다."
            exit 0
          fi
          echo "✅ 추출된 카드 ID: $CARD_ID"

          # 3. API 호출 및 응답 상세 출력
          echo "🚀 API 호출 시도 중..."
          RESPONSE=$(curl -s -i -X POST "https://api.superthread.com/v1/cards/$CARD_ID/comments" \
               -H "Authorization: Bearer $ST_API_KEY" \
               -H "Content-Type: application/json" \
               -d "{\"body\": \"Git Commit Log: $COMMIT_MSG\"}")

          echo "--- API RESPONSE START ---"
          echo "$RESPONSE"
          echo "--- API RESPONSE END ---"