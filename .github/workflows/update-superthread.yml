name: Update Superthread Card (All Commits in Push)

on:
  push:
    branches:
      - dev

jobs:
  update-superthread:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 모든 커밋 히스토리를 가져와야 범위를 계산할 수 있습니다.

      - name: Send All Commit Logs to Superthread
        env:
          ST_API_KEY: ${{ secrets.SUPERTHREAD_API_KEY }}
          ST_TEAM_ID: "teg6H8Tx"
          TARGET_CARD_NUM: "65"
        run: |
          echo "=== 커밋 로그 취합 시작 ==="

          # 1. 이번 푸시에 포함된 커밋 범위 파악
          # github.event.before는 푸시 전 마지막 커밋, after는 푸시 후 최신 커밋입니다.
          BEFORE_SHA=${{ github.event.before }}
          AFTER_SHA=${{ github.event.after }}

          # 만약 새 브랜치 푸시라면 범위 계산이 안 되므로 최신 1개만 가져옵니다.
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            COMMIT_LIST=$(git log -1 --pretty=format:"<li>%s (by %an)</li>")
            COUNT=1
          else
            # 푸시된 모든 커밋을 리스트 형태로 추출
            COMMIT_LIST=$(git log $BEFORE_SHA..$AFTER_SHA --pretty=format:"<li>%s (by %an)</li>")
            COUNT=$(git rev-list --count $BEFORE_SHA..$AFTER_SHA)
          fi

          echo "총 $COUNT 개의 커밋을 발견했습니다."

          # 2. HTML 메시지 구성
          FULL_HTML="<p><b>🚀 Dev 브랜치 업데이트 ($COUNT 개의 커밋)</b></p><ul>$COMMIT_LIST</ul>"

          # 3. jq를 사용하여 안전하게 JSON 생성
          JSON_PAYLOAD=$(jq -n \
            --arg cid "$TARGET_CARD_NUM" \
            --arg content "$FULL_HTML" \
            '{card_id: $cid, schema: 1, content: $content}')

          # 4. API 호출
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.superthread.com/v1/$ST_TEAM_ID/comments" \
               -H "Authorization: Bearer $ST_API_KEY" \
               -H "Content-Type: application/json" \
               -d "$JSON_PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 200 ]; then
            echo "🎉 성공: $COUNT 개의 커밋 로그가 C-$TARGET_CARD_NUM 카드에 기록되었습니다."
          else
            echo "❌ 실패 응답 본문: $RESPONSE"
            exit 1
          fi